name: masterlion
services:
  masterlion:
    image: masterlion:local
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-true}
    container_name: masterlion
    ports:
      - '${LOBE_PORT}:3210'
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      aihub-db-bridge:
        condition: service_healthy
    environment:
      - 'KEY_VAULTS_SECRET=${KEY_VAULTS_SECRET}'
      - 'AUTH_SECRET=${AUTH_SECRET}'
      - 'JWKS_KEY=${JWKS_KEY:?Set JWKS_KEY for internal JWT signing}'
      - 'DATABASE_DRIVER=${DATABASE_DRIVER:-node}'
      - 'DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgresql:5432/${LOBE_DB_NAME}'
      - 'INTERNAL_APP_URL=http://localhost:3210'
      - 'S3_ENDPOINT=${S3_ENDPOINT:?Set S3_ENDPOINT to your OSS/COS S3-compatible endpoint}'
      - 'S3_BUCKET=${S3_BUCKET:?Set S3_BUCKET to your object storage bucket}'
      - 'S3_ENABLE_PATH_STYLE=${S3_ENABLE_PATH_STYLE:-0}'
      - 'S3_ACCESS_KEY=${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID for object storage}'
      - 'S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID for object storage}'
      - 'S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY for object storage}'
      - 'S3_REGION=${S3_REGION:-}'
      - 'LLM_VISION_IMAGE_USE_BASE64=1'
      - 'S3_SET_ACL=${S3_SET_ACL:-0}'
      - 'DEFAULT_FILES_CONFIG=${DEFAULT_FILES_CONFIG:?Set DEFAULT_FILES_CONFIG to the Aihub embedding model, for example embedding_model=newapi/YOUR_AIHUB_EMBEDDING_MODEL,query_mode=full_text}'
      - 'CHUNKS_AUTO_EMBEDDING=${CHUNKS_AUTO_EMBEDDING:-1}'
      - 'SEARXNG_URL=http://searxng:8080'
      - 'REDIS_URL=redis://redis:6379'
      - 'REDIS_PREFIX=lobechat'
      - 'REDIS_TLS=0'
      - 'AIHUB_PROXY_URL=${AIHUB_PROXY_URL}'
      - 'AIHUB_DEFAULT_MODEL=${AIHUB_DEFAULT_MODEL:-}'
      - 'AIHUB_HIDDEN_MODELS=${AIHUB_HIDDEN_MODELS:-}'
      - 'AIHUB_MANAGED_TOKEN_NAME=${AIHUB_MANAGED_TOKEN_NAME:-masterlion-managed}'
      - 'AIHUB_USAGE_PAGE_SIZE=${AIHUB_USAGE_PAGE_SIZE:-100}'
      - 'AIHUB_ADMIN_USER_ID=${AIHUB_ADMIN_USER_ID:-}'
      - 'AIHUB_ADMIN_ACCESS_TOKEN=${AIHUB_ADMIN_ACCESS_TOKEN:-}'
      - 'AIHUB_DATA_SOURCE=${AIHUB_DATA_SOURCE:-bridge}'
      - 'AIHUB_BRIDGE_URL=${AIHUB_BRIDGE_URL:-http://masterlion-aihub-db-bridge:3218}'
      - 'AIHUB_BRIDGE_TOKEN=${AIHUB_BRIDGE_TOKEN:?Set AIHUB_BRIDGE_TOKEN to a long random shared secret}'
      - 'AIHUB_READONLY_DATABASE_URL='
    env_file:
      - .env
    restart: always
    networks:
      - masterlion-network

  aihub-db-bridge:
    image: masterlion-aihub-db-bridge:local
    build:
      context: ../..
      dockerfile: apps/aihub-db-bridge/Dockerfile
    container_name: masterlion-aihub-db-bridge
    environment:
      - 'AIHUB_BRIDGE_TOKEN=${AIHUB_BRIDGE_TOKEN:?Set AIHUB_BRIDGE_TOKEN to a long random shared secret}'
      - 'AIHUB_MANAGED_TOKEN_NAME=${AIHUB_MANAGED_TOKEN_NAME:-masterlion-managed}'
      - 'AIHUB_QUERY_TIMEOUT_MS=${AIHUB_QUERY_TIMEOUT_MS:-15000}'
      - 'AIHUB_READONLY_DATABASE_URL=${AIHUB_READONLY_DATABASE_URL:?Set AIHUB_READONLY_DATABASE_URL for aihub-db-bridge}'
      - 'PORT=3218'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://localhost:3218/health", { headers: { Authorization: "Bearer " + process.env.AIHUB_BRIDGE_TOKEN } }).then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: always
    networks:
      - masterlion-network

  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: masterlion-postgres
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_DB=${LOBE_DB_NAME}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - masterlion-network

  redis:
    image: redis:7-alpine
    container_name: masterlion-redis
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - 'redis_data:/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - masterlion-network

  searxng:
    image: searxng/searxng
    container_name: masterlion-searxng
    volumes:
      - './searxng:/etc/searxng'
    environment:
      - 'SEARXNG_SETTINGS_FILE=/etc/searxng/settings.yml'
    restart: always
    networks:
      - masterlion-network

networks:
  masterlion-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
