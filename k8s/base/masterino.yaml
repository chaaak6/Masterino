apiVersion: v1
kind: Service
metadata:
  name: masterino
  labels:
    app.kubernetes.io/name: masterino
    app.kubernetes.io/part-of: masterino
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: masterino
  ports:
    - name: http
      port: 3210
      targetPort: 3210
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: masterino
  labels:
    app.kubernetes.io/name: masterino
    app.kubernetes.io/part-of: masterino
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: masterino
  template:
    metadata:
      labels:
        app.kubernetes.io/name: masterino
        app.kubernetes.io/part-of: masterino
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: masterino
          image: boen-registry-vpc.cn-shenzhen.cr.aliyuncs.com/biel_client/masterino:v1.0.3
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3210
              name: http
          envFrom:
            - secretRef:
                name: masterino-secret
            - configMapRef:
                name: masterino-config
          env:
            # The application must never connect directly to the Aihub database.
            - name: AIHUB_READONLY_DATABASE_URL
              value: ''
            # Application pods use explicit service credentials and must never
            # inherit the ACK worker node's RAM role through instance metadata.
            - name: ALIBABA_CLOUD_ECS_METADATA_DISABLED
              value: 'true'
            # Keep Alibaba Cloud credential providers from falling back to
            # tokenless IMDSv1 if a library ignores the stronger disable flag.
            - name: ALIBABA_CLOUD_IMDSV1_DISABLE
              value: 'true'
            # Apply the equivalent fail-closed behavior to AWS SDK credential
            # provider chains.
            - name: AWS_EC2_METADATA_DISABLED
              value: 'true'
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: '1'
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
