apiVersion: v1
kind: Service
metadata:
  name: masterlion-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: masterlion
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: masterlion-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: masterlion
spec:
  serviceName: masterlion-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: masterlion
    spec:
      containers:
        - name: postgres
          image: boen-registry-vpc.cn-shenzhen.cr.aliyuncs.com/biel_client/paradedb:latest-pg17
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: masterlion-config
                  key: LOBE_DB_NAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterlion-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "PGPASSWORD=\"$POSTGRES_PASSWORD\" pg_isready -U postgres -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "PGPASSWORD=\"$POSTGRES_PASSWORD\" pg_isready -U postgres -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: alicloud-disk-essd
        resources:
          requests:
            storage: 20Gi
