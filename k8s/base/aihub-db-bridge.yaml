apiVersion: v1
kind: Service
metadata:
  name: masterlion-aihub-db-bridge
  labels:
    app.kubernetes.io/name: aihub-db-bridge
    app.kubernetes.io/part-of: masterlion
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aihub-db-bridge
  ports:
    - name: http
      port: 3218
      targetPort: 3218
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: masterlion-aihub-db-bridge
  labels:
    app.kubernetes.io/name: aihub-db-bridge
    app.kubernetes.io/part-of: masterlion
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aihub-db-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aihub-db-bridge
        app.kubernetes.io/part-of: masterlion
    spec:
      containers:
        - name: aihub-db-bridge
          image: boen-registry-vpc.cn-shenzhen.cr.aliyuncs.com/biel_client/masterlion-aihub-db-bridge:v1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: AIHUB_BRIDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: masterlion-bridge-secret
                  key: AIHUB_BRIDGE_TOKEN
            - name: AIHUB_READONLY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: masterlion-bridge-secret
                  key: AIHUB_READONLY_DATABASE_URL
            - name: AIHUB_MANAGED_TOKEN_NAME
              valueFrom:
                configMapKeyRef:
                  name: masterlion-config
                  key: AIHUB_MANAGED_TOKEN_NAME
            - name: AIHUB_IAM_PROVIDER_ID
              valueFrom:
                configMapKeyRef:
                  name: masterlion-config
                  key: AIHUB_IAM_PROVIDER_ID
            - name: AIHUB_QUERY_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: masterlion-config
                  key: AIHUB_QUERY_TIMEOUT_MS
            - name: PORT
              value: "3218"
          ports:
            - containerPort: 3218
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
