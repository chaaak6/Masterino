apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: masterino-deny-cloud-metadata
  namespace: masterino-test
  labels:
    app.kubernetes.io/name: masterino
    app.kubernetes.io/part-of: masterino
    masterino.io/environment: test
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: masterino
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
    # Defense in depth only. ACK/Terway may exempt node metadata traffic from
    # standard NetworkPolicy, so the pod also disables SDK metadata credential
    # providers and the ECS nodes still need a coordinated IMDSv2 migration.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 100.100.100.200/32
              - 169.254.169.254/32
