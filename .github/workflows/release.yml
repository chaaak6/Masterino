name: Release CI

permissions:
  actions: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the Docker image after release checks pass
        required: true
        type: boolean
        default: false
      release_ref:
        description: Tag or commit to validate
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    if: ${{ !contains(inputs.release_ref || github.ref_name, '-') }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: paradedb/paradedb:latest
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5


        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref || github.ref }}
          token: ${{ github.token }}

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Install deps
        run: pnpm install

      - name: Lint
        run: bun run lint

      - name: Test Database Coverage
        run: bun run --filter @lobechat/database test
        env:
          DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres
          DATABASE_DRIVER: node
          KEY_VAULTS_SECRET: Kix2wcUONd4CX51E/ZPAd36BqM4wzJgKjPtz2sGztqQ=
          S3_PUBLIC_DOMAIN: https://example.com
          APP_URL: https://home.com

      - name: Test App
        run: bun run test-app

      - name: Publish Docker image
        if: github.event_name == 'push' || inputs.publish
        run: gh workflow run release-docker.yml --ref "$RELEASE_REF"
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ inputs.release_ref || github.ref_name }}
