<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masterion</title>
    <style>
      .drag-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 48px;
        -webkit-app-region: drag;
      }

      body {
        margin: 0;
        padding: 48px 0 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #1f1f1f;
        overflow: hidden;
      }

      /* 添加暗色模式支持 */
      @media (prefers-color-scheme: dark) {
        body {
          color: #f5f5f5;
        }
      }

      .container {
        text-align: center;
      }

      .masterlion-brand-loading {
        display: block;
        width: 120px;
        max-width: 60vw;
        height: auto;
        opacity: 0.76;
      }

      .masterlion-brand-loading path {
        fill: currentcolor;
        fill-opacity: 0%;
        stroke: currentcolor;
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        stroke-width: 0.25em;

        animation:
          draw 2s cubic-bezier(0.4, 0, 0.2, 1) infinite,
          fill 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes draw {
        0% {
          stroke-dashoffset: 1000;
        }

        100% {
          stroke-dashoffset: 0;
        }
      }

      @keyframes fill {
        30% {
          fill-opacity: 5%;
        }

        100% {
          fill-opacity: 100%;
        }
      }
    </style>
